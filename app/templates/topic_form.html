{% extends "base.html" %}
{% block title %}Создать тему{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>➕ Создать тему</h1>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                {{ form.title.label(class="form-label") }}
                {{ form.title(class="form-control", size=50) }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
        <a href="/" class="btn btn-secondary mt-2">← На главную</a>
    </div>
</div>
{% endblock %}
